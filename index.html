<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Alicia 🎂</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to bottom, #ffeef2, #fff6f9);
    overflow-x: hidden;
  }

  h1 {
    font-size: 45px;
    margin-top: 20px;
    color: #ff4da6;
    text-shadow: 2px 2px #ffd6e6;
  }

  input, textarea {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 250px;
    max-width: 90%;
    font-size: 16px;
  }

  button {
    padding: 10px 20px;
    margin-top: 10px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #ff4da6;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #ff66b3;
  }

  #messages {
    margin-top: 40px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  .message {
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
    max-width: 250px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transform: rotate(-2deg);
    font-size: 16px;
  }

  .balloon {
    position: fixed;
    bottom: -100px;
    font-size: 40px;
    animation: float 12s linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(0); }
    100% { transform: translateY(-120vh); }
  }

  .cake {
    font-size: 60px;
    margin-top: 20px;
    animation: bounce 1.5s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
</style>
</head>
<body>

<h1>🎉 Happy Birthday Alicia 🎉</h1>
<div class="cake">🎂</div>

<!-- Balloons -->
<div class="balloon" style="left:5%">🎈</div>
<div class="balloon" style="left:20%">🎈</div>
<div class="balloon" style="left:40%">🎈</div>
<div class="balloon" style="left:60%">🎈</div>
<div class="balloon" style="left:80%">🎈</div>

<!-- Message Form -->
<input id="name" placeholder="Your name"><br><br>
<textarea id="message" placeholder="Write a birthday message"></textarea><br><br>
<button onclick="sendMessage()">Send 🎂</button>

<!-- Messages -->
<div id="messages"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyD-MYvgG70K-VVYPx0mXR0A_Lmk_fMguLo",
    authDomain: "birthday-alicia.firebaseapp.com",
    projectId: "birthday-alicia",
    storageBucket: "birthday-alicia.firebasestorage.app",
    messagingSenderId: "4290659284",
    appId: "1:4290659284:web:04866d5d0568687aa3cc41"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Import confetti library
  import confetti from "https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js";

  // Send a message
  window.sendMessage = async function() {
    const name = document.getElementById("name").value || "Anonymous";
    const message = document.getElementById("message").value.trim();
    if (!message) return alert("Please type a message!");

    try {
      await addDoc(collection(db, "messages"), { name, message });
      document.getElementById("name").value = "";
      document.getElementById("message").value = "";

      // Confetti on send
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    } catch (err) {
      alert("Error sending message: " + err.message);
    }
  };

  // Display messages in real-time
  onSnapshot(collection(db, "messages"), (snapshot) => {
    let html = "";
    snapshot.forEach(doc => {
      const data = doc.data();
      html += `<div class="message"><b>${data.name}</b><br>${data.message}</div>`;
    });
    document.getElementById("messages").innerHTML = html;
  });

  console.log("Firebase connected successfully");
</script>

</body>
</html>
